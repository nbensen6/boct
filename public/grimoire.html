<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grimoire - Blood on the Clocktower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --bg-dark: #1a0d2e;
            --bg-card: rgba(30, 15, 50, 0.95);
            --accent: #6b3fa0;
            --accent-light: #9b59b6;
            --gold: #d4af37;
            --gold-dark: #996515;
            --text: #e8e4d9;
            --text-muted: #a89ec2;
            --good: #4a9eff;
            --evil: #c41e3a;
            --dead: #3d3d5c;
            --purple-glow: rgba(107, 63, 160, 0.5);
        }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            background: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(to bottom, rgba(26, 13, 46, 0.3) 0%, rgba(26, 13, 46, 0.7) 100%),
                url('/assets/grimoire.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 12px;
            background: linear-gradient(135deg, rgba(107, 63, 160, 0.3), rgba(30, 15, 50, 0.9));
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            box-shadow: 0 4px 20px var(--purple-glow);
        }

        .nav a {
            color: var(--gold);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .nav a:hover, .nav a.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold);
        }

        h1 {
            text-align: center;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 2rem;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Selection hint */
        .selection-hint {
            text-align: center;
            padding: 10px;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            margin-bottom: 16px;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            display: none;
        }

        .selection-hint.active {
            display: block;
        }

        .grimoire-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Circle seating area */
        .circle-area {
            flex: 1;
            min-width: 350px;
            aspect-ratio: 1;
            position: relative;
            background: radial-gradient(circle, rgba(30, 15, 50, 0.8) 0%, rgba(26, 13, 46, 0.9) 100%);
            border: 3px solid var(--gold-dark);
            border-radius: 50%;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 0 40px var(--purple-glow);
        }

        .seat {
            position: absolute;
            width: 110px;
            height: 130px;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .seat.selected {
            transform: translate(-50%, -50%) scale(1.15);
            z-index: 10;
        }

        .seat.selected .seat-token {
            box-shadow: 0 0 25px var(--gold), 0 0 50px var(--gold);
            border-color: var(--gold);
        }

        .seat.drop-target .seat-token {
            box-shadow: 0 0 30px var(--gold);
            border-color: var(--gold);
            transform: scale(1.1);
        }

        .seat-token {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 3px solid var(--gold-dark);
            background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.08), var(--bg-card));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            line-height: 1;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .seat-token.has-role {
            border-width: 4px;
        }

        .seat-token.good {
            border-color: var(--good);
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.4);
        }

        .seat-token.evil {
            border-color: var(--evil);
            box-shadow: 0 0 15px rgba(196, 30, 58, 0.4);
        }

        .seat-token.dead {
            opacity: 0.5;
            filter: grayscale(50%);
        }

        .seat-token.dead::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 4px;
            background: var(--accent);
            transform: rotate(-45deg);
        }

        .seat-role-name {
            font-size: 0.7rem;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            max-width: 110px;
            line-height: 1.1;
            margin-top: 4px;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.9);
        }
        .seat-role-name.empty {
            color: var(--text-muted);
            font-style: italic;
        }

        .seat-player-name {
            font-size: 0.7rem;
            color: var(--text);
            margin-top: 2px;
            text-align: center;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-style: italic;
        }

        .seat-player-name.dead {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Role tokens panel */
        .tokens-panel {
            width: 320px;
            background: var(--bg-card);
            border: 2px solid var(--gold-dark);
            border-radius: 12px;
            padding: 16px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px var(--purple-glow);
        }

        .tokens-panel h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.2rem;
            margin: 0 0 16px 0;
            text-align: center;
            border-bottom: 1px solid var(--gold-dark);
            padding-bottom: 8px;
        }

        .token-category {
            margin-bottom: 16px;
        }

        .token-category h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .token-category.townsfolk h3 { color: var(--good); }
        .token-category.outsiders h3 { color: #9ca3af; }
        .token-category.minions h3 { color: var(--evil); }
        .token-category.demons h3 { color: #7f1d1d; }

        .token-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 10px;
        }

        .role-token {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: grab;
            transition: all 0.2s;
            padding: 2px;
        }
        .role-token:active { cursor: grabbing; }
        .role-token.dragging { opacity: 0.4; }

        .role-token .token-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            line-height: 1;
            background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.08), var(--bg-dark));
            transition: all 0.2s;
        }

        .role-token .token-label {
            margin-top: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 0.3px;
            color: var(--text);
            max-width: 80px;
            word-wrap: break-word;
        }

        .role-token:hover .token-circle {
            transform: scale(1.08);
        }

        .role-token.selected .token-circle {
            transform: scale(1.15);
            box-shadow: 0 0 20px var(--gold), 0 0 40px var(--gold);
            border-color: var(--gold) !important;
        }

        .role-token.townsfolk .token-circle { border-color: var(--good); }
        .role-token.townsfolk .token-label { color: var(--good); }

        .role-token.outsider .token-circle { border-color: #9ca3af; }
        .role-token.outsider .token-label { color: #9ca3af; }

        .role-token.minion .token-circle { border-color: var(--evil); }
        .role-token.minion .token-label { color: #fca5a5; }

        .role-token.demon .token-circle {
            border-color: #7f1d1d;
            background: linear-gradient(135deg, #1a0505, #2d0a0a);
        }
        .role-token.demon .token-label { color: #dc2626; }

        .role-token.used { opacity: 0.3; }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 10px 20px;
            border: 2px solid var(--gold-dark);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .control-btn.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold);
        }

        .player-count-select {
            padding: 10px;
            border: 2px solid var(--gold-dark);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text);
            font-family: 'Cinzel', serif;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grimoire-layout {
                flex-direction: column;
            }

            .circle-area {
                min-width: 320px;
                max-width: 400px;
            }

            .tokens-panel {
                width: 100%;
                max-height: none;
            }

            .seat-token {
                width: 58px;
                height: 58px;
                font-size: 1.7rem;
            }

            .seat {
                width: 90px;
                height: 115px;
            }

            .seat-role-name, .seat-player-name {
                font-size: 0.62rem;
                max-width: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="index.html">Game Tracker</a>
            <a href="grimoire.html" class="active">Grimoire</a>
            <a href="night.html">Night Order</a>
            <a href="guide.html">Storyteller Guide</a>
        </nav>

        <h1>The Grimoire</h1>

        <div class="selection-hint" id="selectionHint">
            Tap a seat to swap, or tap selected seat again to toggle alive/dead
        </div>

        <div class="controls">
            <label style="color: var(--text); display: flex; align-items: center; gap: 8px;">
                <span style="font-family: 'Cinzel', serif;">Edition:</span>
                <select class="player-count-select" id="editionSelect" onchange="changeEdition()">
                    <option value="trouble_brewing">Trouble Brewing</option>
                    <option value="bad_moon_rising">Bad Moon Rising</option>
                    <option value="sects_and_violets">Sects &amp; Violets</option>
                </select>
            </label>
            <label style="color: var(--text); display: flex; align-items: center; gap: 8px;">
                <span style="font-family: 'Cinzel', serif;">Players:</span>
                <select class="player-count-select" id="playerCount" onchange="updateSeats()">
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13" selected>13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                </select>
            </label>
            <button class="control-btn" onclick="syncFromTracker()">Sync from Tracker</button>
            <button class="control-btn" onclick="clearSelection()">Cancel Selection</button>
            <button class="control-btn" onclick="clearGrimoire()">Clear All</button>
        </div>

        <div class="grimoire-layout">
            <div class="circle-area" id="circleArea">
                <!-- Seats will be generated here -->
            </div>

            <div class="tokens-panel">
                <h2>Role Tokens</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0 0 12px 0; text-align: center;">
                    Drag a role onto a seat &mdash; or tap a role, then tap a seat
                </p>

                <div class="token-category townsfolk">
                    <h3>Townsfolk</h3>
                    <div class="token-grid" id="townsfolkTokens"></div>
                </div>

                <div class="token-category outsiders">
                    <h3>Outsiders</h3>
                    <div class="token-grid" id="outsiderTokens"></div>
                </div>

                <div class="token-category minions">
                    <h3>Minions</h3>
                    <div class="token-grid" id="minionTokens"></div>
                </div>

                <div class="token-category demons">
                    <h3>Demons</h3>
                    <div class="token-grid" id="demonTokens"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const EDITIONS = {
            trouble_brewing: {
                name: "Trouble Brewing",
                townsfolk: [
                    "Washerwoman", "Librarian", "Investigator", "Chef", "Empath",
                    "Fortune Teller", "Undertaker", "Monk", "Ravenkeeper", "Virgin",
                    "Slayer", "Soldier", "Mayor"
                ],
                outsiders: ["Butler", "Drunk", "Recluse", "Saint"],
                minions: ["Poisoner", "Spy", "Scarlet Woman", "Baron"],
                demons: ["Imp"]
            },
            bad_moon_rising: {
                name: "Bad Moon Rising",
                townsfolk: [
                    "Grandmother", "Sailor", "Chambermaid", "Exorcist", "Innkeeper",
                    "Gambler", "Gossip", "Courtier", "Professor", "Minstrel",
                    "Tea Lady", "Pacifist", "Fool"
                ],
                outsiders: ["Tinker", "Moonchild", "Goon", "Lunatic"],
                minions: ["Godfather", "Devil's Advocate", "Assassin", "Mastermind"],
                demons: ["Zombuul", "Pukka", "Shabaloth", "Po"]
            },
            sects_and_violets: {
                name: "Sects & Violets",
                townsfolk: [
                    "Clockmaker", "Dreamer", "Snake Charmer", "Mathematician", "Flowergirl",
                    "Town Crier", "Oracle", "Savant", "Seamstress", "Philosopher",
                    "Artist", "Juggler", "Sage"
                ],
                outsiders: ["Mutant", "Sweetheart", "Barber", "Klutz"],
                minions: ["Evil Twin", "Witch", "Cerenovus", "Pit-Hag"],
                demons: ["Fang Gu", "Vigormortis", "No Dashii", "Vortox"]
            }
        };

        // Role → emoji map. Used in both the seat circles and the token panel.
        // Keeps the token visually distinct while letting the text name sit BELOW
        // the circle so long names like "Scarlet Woman" no longer overflow.
        const ROLE_EMOJI = {
            // Trouble Brewing
            "Washerwoman": "🧺", "Librarian": "📚", "Investigator": "🔍", "Chef": "👨‍🍳",
            "Empath": "💗", "Fortune Teller": "🔮", "Undertaker": "⚰️", "Monk": "🛡️",
            "Ravenkeeper": "🦅", "Virgin": "⚜️", "Slayer": "🏹", "Soldier": "⚔️",
            "Mayor": "👑", "Butler": "🎩", "Drunk": "🍺", "Recluse": "🕸️",
            "Saint": "✨", "Poisoner": "🧪", "Spy": "👁️", "Scarlet Woman": "💋",
            "Baron": "⚖️", "Imp": "😈",
            // Bad Moon Rising
            "Grandmother": "👵", "Sailor": "⚓", "Chambermaid": "🛏️", "Exorcist": "🕯️",
            "Innkeeper": "🏨", "Gambler": "🎲", "Gossip": "💬", "Courtier": "🥂",
            "Professor": "🎓", "Minstrel": "🎵", "Tea Lady": "🫖", "Pacifist": "🕊️",
            "Fool": "🃏", "Tinker": "🔧", "Moonchild": "🌙", "Goon": "🧔",
            "Lunatic": "🌕", "Godfather": "🤵", "Devil's Advocate": "😇", "Assassin": "🗡️",
            "Mastermind": "🧠", "Zombuul": "🧟", "Pukka": "☠️", "Shabaloth": "👹", "Po": "👺",
            // Sects & Violets
            "Clockmaker": "🕰️", "Dreamer": "💭", "Snake Charmer": "🐍", "Mathematician": "🔢",
            "Flowergirl": "🌸", "Town Crier": "📣", "Oracle": "🏛️", "Savant": "🎩",
            "Seamstress": "🧵", "Philosopher": "📖", "Artist": "🎨", "Juggler": "🤹",
            "Sage": "🧙", "Mutant": "🧬", "Sweetheart": "💞", "Barber": "✂️",
            "Klutz": "🤦", "Evil Twin": "👯", "Witch": "🧙‍♀️", "Cerenovus": "👻",
            "Pit-Hag": "🎃", "Fang Gu": "🧛", "Vigormortis": "💀", "No Dashii": "👽",
            "Vortox": "🌀"
        };

        const CATEGORY_FALLBACK = {
            townsfolk: "🌾",
            outsiders: "🎭",
            minions: "🗡️",
            demons: "😈"
        };

        function roleEmoji(role, category) {
            if (!role) return '';
            return ROLE_EMOJI[role] || (category && CATEGORY_FALLBACK[category]) || '❓';
        }

        let currentEdition = 'trouble_brewing';

        let grimoireState = {
            playerCount: 13,
            edition: 'trouble_brewing',
            seats: []
        };

        // Selection state
        let selectedSeatIndex = null;
        let selectedRole = null;
        let lastTapTime = 0; // Debounce taps

        function loadState() {
            const saved = localStorage.getItem('boctGrimoireState');
            if (saved) {
                grimoireState = JSON.parse(saved);
                document.getElementById('playerCount').value = grimoireState.playerCount;
                if (grimoireState.edition) {
                    currentEdition = grimoireState.edition;
                    document.getElementById('editionSelect').value = currentEdition;
                }
            }
            initSeats();
            renderTokens();
            renderSeats();
        }

        function changeEdition() {
            currentEdition = document.getElementById('editionSelect').value;
            grimoireState.edition = currentEdition;
            saveState();
            renderTokens();
        }

        function saveState() {
            localStorage.setItem('boctGrimoireState', JSON.stringify(grimoireState));
        }

        function initSeats() {
            if (!grimoireState.seats || grimoireState.seats.length !== grimoireState.playerCount) {
                grimoireState.seats = [];
                for (let i = 0; i < grimoireState.playerCount; i++) {
                    grimoireState.seats.push({
                        seatNum: i + 1,
                        role: null,
                        playerName: null,
                        team: null,
                        alive: true
                    });
                }
            }
        }

        function updateSeats() {
            const newCount = parseInt(document.getElementById('playerCount').value);
            const oldSeats = grimoireState.seats;
            grimoireState.playerCount = newCount;
            grimoireState.seats = [];

            for (let i = 0; i < newCount; i++) {
                if (oldSeats[i]) {
                    grimoireState.seats.push(oldSeats[i]);
                } else {
                    grimoireState.seats.push({
                        seatNum: i + 1,
                        role: null,
                        playerName: null,
                        team: null,
                        alive: true
                    });
                }
            }

            clearSelection();
            saveState();
            renderSeats();
            renderTokens();
        }

        function roleCategory(role) {
            const edition = EDITIONS[currentEdition];
            if (edition.townsfolk.includes(role)) return 'townsfolk';
            if (edition.outsiders.includes(role)) return 'outsiders';
            if (edition.minions.includes(role)) return 'minions';
            if (edition.demons.includes(role)) return 'demons';
            return null;
        }

        function renderSeats() {
            const area = document.getElementById('circleArea');
            const centerX = 50;
            const centerY = 50;
            const radius = 40;

            area.innerHTML = '';

            grimoireState.seats.forEach((seat, i) => {
                const angle = (i / grimoireState.playerCount) * 2 * Math.PI - Math.PI / 2;
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                const seatEl = document.createElement('div');
                seatEl.className = 'seat' + (selectedSeatIndex === i ? ' selected' : '');
                seatEl.style.left = x + '%';
                seatEl.style.top = y + '%';

                const tokenClasses = ['seat-token'];
                if (seat.role) tokenClasses.push('has-role');
                if (seat.team) tokenClasses.push(seat.team);
                if (!seat.alive) tokenClasses.push('dead');

                const emoji = seat.role ? roleEmoji(seat.role, roleCategory(seat.role)) : '?';
                const roleLabel = seat.role
                    ? `<div class="seat-role-name">${escapeHtml(seat.role)}</div>`
                    : `<div class="seat-role-name empty">empty</div>`;
                const playerLabel = seat.playerName
                    ? `<div class="seat-player-name ${seat.alive ? '' : 'dead'}">${escapeHtml(seat.playerName)}</div>`
                    : '';

                seatEl.innerHTML = `
                    <div class="${tokenClasses.join(' ')}">${emoji}</div>
                    ${roleLabel}
                    ${playerLabel}
                `;

                seatEl.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    handleSeatTap(i);
                });

                // Drag-and-drop target
                seatEl.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    seatEl.classList.add('drop-target');
                });
                seatEl.addEventListener('dragleave', () => {
                    seatEl.classList.remove('drop-target');
                });
                seatEl.addEventListener('drop', (e) => {
                    e.preventDefault();
                    seatEl.classList.remove('drop-target');
                    const role = e.dataTransfer.getData('text/role');
                    const category = e.dataTransfer.getData('text/category');
                    if (role) assignRoleToSeat(i, role, category);
                });

                area.appendChild(seatEl);
            });
        }

        function renderTokens() {
            const usedRoles = new Set(grimoireState.seats.filter(s => s.role).map(s => s.role));
            const edition = EDITIONS[currentEdition];

            ['townsfolk', 'outsiders', 'minions', 'demons'].forEach(category => {
                const container = document.getElementById(
                    category === 'outsiders' ? 'outsiderTokens' :
                    category === 'minions' ? 'minionTokens' :
                    category === 'demons' ? 'demonTokens' : 'townsfolkTokens'
                );

                const singular = category === 'outsiders' ? 'outsider' :
                                 category === 'minions' ? 'minion' :
                                 category === 'demons' ? 'demon' : 'townsfolk';

                container.innerHTML = edition[category].map(role => {
                    const usedClass = usedRoles.has(role) ? 'used' : '';
                    const selectedClass = selectedRole && selectedRole.role === role ? 'selected' : '';
                    return `
                        <div class="role-token ${singular} ${usedClass} ${selectedClass}"
                             draggable="true"
                             data-role="${escapeHtml(role)}"
                             data-category="${category}"
                             title="${escapeHtml(role)}">
                            <div class="token-circle">${roleEmoji(role, category)}</div>
                            <div class="token-label">${escapeHtml(role)}</div>
                        </div>
                    `;
                }).join('');

                // Wire up handlers on the freshly-rendered tokens
                container.querySelectorAll('.role-token').forEach(tokenEl => {
                    const role = tokenEl.dataset.role;
                    const cat = tokenEl.dataset.category;
                    tokenEl.addEventListener('click', () => handleRoleTap(role, cat));
                    tokenEl.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/role', role);
                        e.dataTransfer.setData('text/category', cat);
                        e.dataTransfer.effectAllowed = 'move';
                        tokenEl.classList.add('dragging');
                    });
                    tokenEl.addEventListener('dragend', () => {
                        tokenEl.classList.remove('dragging');
                    });
                });
            });
        }

        function assignRoleToSeat(seatIndex, role, category) {
            const team = (category === 'minions' || category === 'demons') ? 'evil' : 'good';
            // Remove role from any prior seat so it isn't duplicated
            grimoireState.seats.forEach(s => {
                if (s.role === role) {
                    s.role = null;
                    s.team = null;
                }
            });
            grimoireState.seats[seatIndex].role = role;
            grimoireState.seats[seatIndex].team = team;
            selectedRole = null;
            selectedSeatIndex = null;
            saveState();
            updateSelectionHint();
            renderSeats();
            renderTokens();
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function handleRoleTap(role, category) {
            // Debounce - ignore taps within 300ms
            const now = Date.now();
            if (now - lastTapTime < 300) return;
            lastTapTime = now;

            // If same role tapped, deselect
            if (selectedRole && selectedRole.role === role) {
                selectedRole = null;
                selectedSeatIndex = null;
            } else {
                // Select this role
                selectedRole = {
                    role,
                    team: (category === 'minions' || category === 'demons') ? 'evil' : 'good'
                };
                selectedSeatIndex = null;
            }
            updateSelectionHint();
            renderSeats();
            renderTokens();
        }

        function handleSeatTap(seatIndex) {
            // Debounce - ignore taps within 300ms
            const now = Date.now();
            if (now - lastTapTime < 300) return;
            lastTapTime = now;

            // If a role is selected, assign it to this seat
            if (selectedRole) {
                const cat = selectedRole.team === 'evil'
                    ? (EDITIONS[currentEdition].demons.includes(selectedRole.role) ? 'demons' : 'minions')
                    : (EDITIONS[currentEdition].outsiders.includes(selectedRole.role) ? 'outsiders' : 'townsfolk');
                assignRoleToSeat(seatIndex, selectedRole.role, cat);
                return;
            }

            // If tapping the same seat that's already selected, toggle alive/dead
            if (selectedSeatIndex === seatIndex) {
                grimoireState.seats[seatIndex].alive = !grimoireState.seats[seatIndex].alive;
                selectedSeatIndex = null;
                saveState();
                updateSelectionHint();
                renderSeats();
                return;
            }

            // If another seat is selected, swap them
            if (selectedSeatIndex !== null) {
                // Deep copy both seats to avoid reference issues
                const seat1 = {
                    seatNum: seatIndex + 1,
                    role: grimoireState.seats[selectedSeatIndex].role,
                    playerName: grimoireState.seats[selectedSeatIndex].playerName,
                    team: grimoireState.seats[selectedSeatIndex].team,
                    alive: grimoireState.seats[selectedSeatIndex].alive
                };
                const seat2 = {
                    seatNum: selectedSeatIndex + 1,
                    role: grimoireState.seats[seatIndex].role,
                    playerName: grimoireState.seats[seatIndex].playerName,
                    team: grimoireState.seats[seatIndex].team,
                    alive: grimoireState.seats[seatIndex].alive
                };

                grimoireState.seats[seatIndex] = seat1;
                grimoireState.seats[selectedSeatIndex] = seat2;

                selectedSeatIndex = null;
                saveState();
                updateSelectionHint();
                renderSeats();
                renderTokens();
                return;
            }

            // Otherwise, select this seat
            selectedSeatIndex = seatIndex;
            updateSelectionHint();
            renderSeats();
        }

        function clearSelection() {
            selectedSeatIndex = null;
            selectedRole = null;
            updateSelectionHint();
            renderSeats();
            renderTokens();
        }

        function updateSelectionHint() {
            const hint = document.getElementById('selectionHint');
            if (selectedRole) {
                hint.textContent = `Selected: ${selectedRole.role} - Tap a seat to assign`;
                hint.classList.add('active');
            } else if (selectedSeatIndex !== null) {
                const seat = grimoireState.seats[selectedSeatIndex];
                const name = seat.playerName || seat.role || 'Empty seat';
                hint.textContent = `Selected: ${name} - Tap another seat to swap, or tap again to toggle alive/dead`;
                hint.classList.add('active');
            } else {
                hint.classList.remove('active');
            }
        }

        function syncFromTracker() {
            const trackerState = localStorage.getItem('boctStorytellerState');
            if (!trackerState) {
                alert('No tracker data found. Open the Game Tracker first.');
                return;
            }

            const tracker = JSON.parse(trackerState);
            if (!tracker.players || tracker.players.length === 0) {
                alert('No players in the tracker yet.');
                return;
            }

            grimoireState.playerCount = Math.max(tracker.players.length, 5);
            document.getElementById('playerCount').value = grimoireState.playerCount;

            grimoireState.seats = [];
            for (let i = 0; i < grimoireState.playerCount; i++) {
                const player = tracker.players[i];
                grimoireState.seats.push({
                    seatNum: i + 1,
                    role: player ? player.role || null : null,
                    playerName: player ? player.name : null,
                    team: player ? player.team || null : null,
                    alive: player ? player.alive : true
                });
            }

            clearSelection();
            saveState();
            renderSeats();
            renderTokens();
        }

        function clearGrimoire() {
            if (confirm('Clear all roles and player assignments?')) {
                grimoireState.seats.forEach(s => {
                    s.role = null;
                    s.team = null;
                    s.playerName = null;
                    s.alive = true;
                });
                clearSelection();
                saveState();
                renderSeats();
                renderTokens();
            }
        }

        // Initialize
        loadState();
    </script>
</body>
</html>
