<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Night Order - Blood on the Clocktower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-dark: #0d0d0d;
            --bg-card: rgba(20, 15, 15, 0.95);
            --accent: #8b0000;
            --accent-light: #c41e3a;
            --gold: #d4af37;
            --gold-dark: #996515;
            --text: #e8e4d9;
            --text-muted: #888;
            --good: #4a9eff;
            --evil: #c41e3a;
            --night-blue: #1e3a5f;
        }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            background: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse 200px 200px at 20% 10%, rgba(30, 58, 95, 0.4) 0%, transparent 70%),
                radial-gradient(ellipse 150px 150px at 80% 20%, rgba(30, 58, 95, 0.3) 0%, transparent 70%),
                linear-gradient(to bottom, #0a1525 0%, #0d0d0d 50%, #0a0505 100%);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px;
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.3), rgba(20, 15, 15, 0.9));
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .nav a {
            color: var(--gold);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            padding: 8px 14px;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .nav a:hover, .nav a.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold);
        }

        h1 {
            text-align: center;
            font-family: 'Cinzel', serif;
            color: #93c5fd;
            font-size: 2rem;
            margin: 0 0 8px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 20px rgba(30, 58, 95, 0.8);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-style: italic;
        }

        .night-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--bg-card);
            border: 2px solid var(--night-blue);
            border-radius: 12px;
        }

        .night-btn {
            padding: 12px 24px;
            border: 2px solid var(--night-blue);
            border-radius: 8px;
            background: rgba(30, 58, 95, 0.3);
            color: #93c5fd;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .night-btn:hover {
            background: rgba(30, 58, 95, 0.5);
        }

        .night-btn.active {
            background: var(--night-blue);
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .night-display {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--gold);
            min-width: 120px;
            text-align: center;
        }

        .no-roles-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
            font-size: 1.1rem;
        }

        .role-order {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .role-card {
            background: var(--bg-card);
            border: 2px solid var(--gold-dark);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: all 0.3s;
        }

        .role-card:hover {
            border-color: var(--gold);
        }

        .role-card.inactive {
            opacity: 0.4;
            border-style: dashed;
        }

        .role-card.good {
            border-left: 5px solid var(--good);
        }

        .role-card.evil {
            border-left: 5px solid var(--evil);
        }

        .role-number {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--gold);
            min-width: 40px;
            text-align: center;
        }

        .role-info {
            flex: 1;
        }

        .role-name {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .role-player {
            font-size: 0.9rem;
            color: #93c5fd;
            margin-bottom: 8px;
        }

        .role-instruction {
            background: rgba(30, 58, 95, 0.3);
            border: 1px solid var(--night-blue);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .role-instruction strong {
            color: var(--gold);
        }

        .role-instruction .action {
            color: #93c5fd;
            font-style: italic;
        }

        .minion-info, .demon-info {
            background: rgba(139, 0, 0, 0.2);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .section-header {
            font-family: 'Cinzel', serif;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 24px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--gold-dark);
        }

        .section-header:first-of-type {
            margin-top: 0;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.good { background: var(--good); }
        .legend-dot.evil { background: var(--evil); }
        .legend-dot.inactive { background: var(--text-muted); opacity: 0.5; }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .nav a { font-size: 0.8rem; padding: 6px 10px; }
            .role-card { flex-direction: column; gap: 8px; }
            .role-number { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="index.html">Game Tracker</a>
            <a href="grimoire.html">Grimoire</a>
            <a href="night.html" class="active">Night Order</a>
            <a href="guide.html">Storyteller Guide</a>
        </nav>

        <h1>Night Order</h1>
        <p class="subtitle">Who to wake and what to tell them</p>

        <div class="night-selector">
            <select class="night-btn" id="editionSelect" onchange="changeEdition()" style="min-width: 150px;">
                <option value="trouble_brewing">Trouble Brewing</option>
                <option value="bad_moon_rising">Bad Moon Rising</option>
            </select>
            <button class="night-btn" onclick="changeNight(-1)">&larr;</button>
            <div class="night-display">Night <span id="nightNum">1</span></div>
            <button class="night-btn" onclick="changeNight(1)">&rarr;</button>
            <button class="night-btn" id="firstNightBtn" onclick="setNight(1)">First Night</button>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot good"></div> Good</div>
            <div class="legend-item"><div class="legend-dot evil"></div> Evil</div>
            <div class="legend-item"><div class="legend-dot inactive"></div> Not in game</div>
        </div>

        <div id="nightOrder"></div>
    </div>

    <script>
        const EDITIONS = {
            trouble_brewing: {
                name: "Trouble Brewing",
                firstNight: [
                    { role: "Poisoner", team: "evil", instruction: "The Poisoner wakes and points to a player. That player is poisoned tonight and tomorrow day.", action: "They choose who to poison" },
                    { role: "Spy", team: "evil", instruction: "Show the Spy the Grimoire. They see all roles and tokens.", action: "Show them the Grimoire" },
                    { role: "Washerwoman", team: "good", instruction: "Point to 2 players, one of which is the Townsfolk you're showing. Show the Townsfolk token.", action: "Point to 2 players, show Townsfolk token" },
                    { role: "Librarian", team: "good", instruction: "Point to 2 players, one of which is the Outsider you're showing. Show the Outsider token. (Or show 'zero' if no Outsiders)", action: "Point to 2 players, show Outsider token" },
                    { role: "Investigator", team: "good", instruction: "Point to 2 players, one of which is the Minion you're showing. Show the Minion token.", action: "Point to 2 players, show Minion token" },
                    { role: "Chef", team: "good", instruction: "Show fingers for the number of pairs of evil players sitting adjacent.", action: "Show number of evil pairs (fingers)" },
                    { role: "Empath", team: "good", instruction: "Show fingers for the number of their alive neighbors (left & right) that are evil.", action: "Show 0, 1, or 2 fingers" },
                    { role: "Fortune Teller", team: "good", instruction: "The Fortune Teller points to 2 players. Nod 'yes' if either is the Demon (or Red Herring), shake 'no' otherwise.", action: "They choose 2 players, nod/shake" },
                    { role: "Butler", team: "good", instruction: "The Butler points to a player. That is their Master tomorrow - they may only vote when their Master votes.", action: "They choose their Master" },
                ],
                otherNights: [
                    { role: "Poisoner", team: "evil", instruction: "The Poisoner wakes and points to a player to poison.", action: "They choose who to poison" },
                    { role: "Monk", team: "good", instruction: "The Monk points to a player (not themselves). That player is safe from the Demon tonight.", action: "They choose who to protect" },
                    { role: "Spy", team: "evil", instruction: "Show the Spy the Grimoire.", action: "Show them the Grimoire" },
                    { role: "Scarlet Woman", team: "evil", instruction: "(Only if Demon died today with 5+ alive) The Scarlet Woman becomes the Imp.", action: "Show them: 'You are the Imp'" },
                    { role: "Imp", team: "evil", instruction: "The Imp points to a player to kill. If they choose themselves, a Minion becomes the Imp.", action: "They choose who to kill" },
                    { role: "Ravenkeeper", team: "good", instruction: "(Only if they died tonight) The Ravenkeeper points to a player. Show that player's character token.", action: "They choose, show character token" },
                    { role: "Undertaker", team: "good", instruction: "(Only if someone was executed today) Show the character token of the player who was executed.", action: "Show executed player's token" },
                    { role: "Empath", team: "good", instruction: "Show fingers for the number of their alive neighbors that are evil.", action: "Show 0, 1, or 2 fingers" },
                    { role: "Fortune Teller", team: "good", instruction: "The Fortune Teller points to 2 players. Nod 'yes' if either is the Demon (or Red Herring), shake 'no' otherwise.", action: "They choose 2 players, nod/shake" },
                    { role: "Butler", team: "good", instruction: "The Butler points to a player to be their Master.", action: "They choose their Master" },
                ],
                minions: ["Poisoner", "Spy", "Scarlet Woman", "Baron"],
                demons: ["Imp"]
            },
            bad_moon_rising: {
                name: "Bad Moon Rising",
                firstNight: [
                    { role: "Lunatic", team: "good", instruction: "Show the Lunatic 3 bluffs (not in play). Point to players as their 'Minions'. They think they are the Demon.", action: "Show bluffs, point to fake Minions" },
                    { role: "Sailor", team: "good", instruction: "The Sailor points to a player. Tonight, that player is drunk and the Sailor is safe.", action: "They choose who to make drunk" },
                    { role: "Courtier", team: "good", instruction: "The Courtier points to a player. That player is drunk for 3 nights and 3 days.", action: "They choose who to make drunk" },
                    { role: "Godfather", team: "evil", instruction: "Show the Godfather the Outsiders in play.", action: "Point to Outsiders" },
                    { role: "Devil's Advocate", team: "evil", instruction: "The Devil's Advocate points to a player. If that player is executed tomorrow, they don't die.", action: "They choose who to protect" },
                    { role: "Pukka", team: "evil", instruction: "The Pukka points to a player to poison. They die tomorrow night.", action: "They choose who to poison" },
                    { role: "Grandmother", team: "good", instruction: "Show the Grandmother who their grandchild is.", action: "Point to grandchild, show their role" },
                    { role: "Chambermaid", team: "good", instruction: "The Chambermaid points to 2 players. Show them how many woke tonight.", action: "They choose 2, show number (fingers)" },
                    { role: "Goon", team: "good", instruction: "The Goon becomes drunk until dusk and the 1st player to choose them becomes drunk.", action: "(First night only)" },
                ],
                otherNights: [
                    { role: "Sailor", team: "good", instruction: "The Sailor points to a player. Tonight, that player is drunk and the Sailor is safe.", action: "They choose who to make drunk" },
                    { role: "Courtier", team: "good", instruction: "If the Courtier hasn't used their ability, they may point to a player to make drunk for 3 nights/days.", action: "They may choose (once per game)" },
                    { role: "Innkeeper", team: "good", instruction: "The Innkeeper points to 2 players. Those players are safe tonight but one is drunk.", action: "They choose 2 to protect" },
                    { role: "Devil's Advocate", team: "evil", instruction: "The Devil's Advocate points to a player. If that player is executed tomorrow, they don't die.", action: "They choose who to protect" },
                    { role: "Gambler", team: "good", instruction: "The Gambler points to a player and guesses their role. If wrong, the Gambler dies.", action: "They guess a player's role" },
                    { role: "Exorcist", team: "good", instruction: "The Exorcist points to a player. If that player is the Demon, the Demon doesn't wake tonight.", action: "They choose who to target" },
                    { role: "Lunatic", team: "good", instruction: "The Lunatic 'kills' a player (show them choosing but ignore it).", action: "They think they're killing" },
                    { role: "Zombuul", team: "evil", instruction: "If no one died today, the Zombuul kills a player.", action: "They choose who to kill" },
                    { role: "Pukka", team: "evil", instruction: "The player poisoned last night dies. The Pukka points to a new player to poison.", action: "Previous target dies, new poison" },
                    { role: "Shabaloth", team: "evil", instruction: "The Shabaloth points to 2 players to kill. A dead player who was killed last night might regurgitate.", action: "They choose 2 to kill" },
                    { role: "Po", team: "evil", instruction: "The Po kills a player. If the Po chose no one last night, they may kill 3 players instead.", action: "They choose 1 (or 3)" },
                    { role: "Assassin", team: "evil", instruction: "Once per game, the Assassin kills a player (bypasses protection).", action: "They may use ability (once)" },
                    { role: "Godfather", team: "evil", instruction: "If an Outsider died today, the Godfather chooses a player to kill.", action: "They choose who to kill" },
                    { role: "Professor", team: "good", instruction: "Once per game, the Professor chooses a dead player. If Townsfolk, they live.", action: "They may use ability (once)" },
                    { role: "Gossip", team: "good", instruction: "If the Gossip's statement was true today, a player dies.", action: "Check if statement was true" },
                    { role: "Moonchild", team: "good", instruction: "If the Moonchild died last night, they point to a player. If Good, that player dies.", action: "They choose (if they died)" },
                    { role: "Tinker", team: "good", instruction: "The Tinker might die (Storyteller's choice).", action: "You may kill the Tinker" },
                    { role: "Chambermaid", team: "good", instruction: "The Chambermaid points to 2 players. Show them how many woke tonight.", action: "They choose 2, show number (fingers)" },
                ],
                minions: ["Godfather", "Devil's Advocate", "Assassin", "Mastermind"],
                demons: ["Zombuul", "Pukka", "Shabaloth", "Po"]
            }
        };

        let currentEdition = 'trouble_brewing';

        let currentNight = 1;
        let activeRoles = new Set();
        let playersByRole = {};

        function loadGameState() {
            // Try to load from grimoire first, then tracker
            const grimoireState = localStorage.getItem('boctGrimoireState');
            const trackerState = localStorage.getItem('boctStorytellerState');

            activeRoles = new Set();
            playersByRole = {};

            if (grimoireState) {
                const grimoire = JSON.parse(grimoireState);
                // Sync edition from grimoire
                if (grimoire.edition && EDITIONS[grimoire.edition]) {
                    currentEdition = grimoire.edition;
                    document.getElementById('editionSelect').value = currentEdition;
                }
                grimoire.seats.forEach(seat => {
                    if (seat.role) {
                        activeRoles.add(seat.role);
                        playersByRole[seat.role] = seat.playerName || 'Unknown';
                    }
                });
            } else if (trackerState) {
                const tracker = JSON.parse(trackerState);
                tracker.players.forEach(player => {
                    if (player.role) {
                        activeRoles.add(player.role);
                        playersByRole[player.role] = player.name || 'Unknown';
                    }
                });
            }

            // Also sync the night number from tracker
            if (trackerState) {
                const tracker = JSON.parse(trackerState);
                if (tracker.dayNum) {
                    currentNight = tracker.dayNum;
                    document.getElementById('nightNum').textContent = currentNight;
                }
            }

            renderNightOrder();
        }

        function changeEdition() {
            currentEdition = document.getElementById('editionSelect').value;
            renderNightOrder();
        }

        function changeNight(delta) {
            currentNight = Math.max(1, currentNight + delta);
            document.getElementById('nightNum').textContent = currentNight;
            renderNightOrder();
        }

        function setNight(night) {
            currentNight = night;
            document.getElementById('nightNum').textContent = currentNight;
            renderNightOrder();
        }

        function renderNightOrder() {
            const container = document.getElementById('nightOrder');
            const edition = EDITIONS[currentEdition];
            const isFirstNight = currentNight === 1;
            const order = isFirstNight ? edition.firstNight : edition.otherNights;

            let html = '';

            // First night special: Minion & Demon info
            if (isFirstNight) {
                html += '<div class="section-header">Minion & Demon Info (Before individual wakes)</div>';

                // Minion info
                const activeMinions = edition.minions.filter(r => activeRoles.has(r));
                html += `
                    <div class="role-card evil ${activeMinions.length === 0 ? 'inactive' : ''}">
                        <div class="role-number">0</div>
                        <div class="role-info">
                            <div class="role-name">Minion Info</div>
                            <div class="role-player">${activeMinions.length > 0 ? activeMinions.map(r => playersByRole[r] || r).join(', ') : 'No minions in game'}</div>
                            <div class="role-instruction">
                                <strong>Wake all Minions.</strong> Let them see each other. Point to the Demon. Show them 3 not-in-play good characters (bluffs for the Demon to use).
                            </div>
                        </div>
                    </div>
                `;

                // Demon info
                const activeDemons = edition.demons.filter(r => activeRoles.has(r));
                html += `
                    <div class="role-card evil ${activeDemons.length === 0 ? 'inactive' : ''}">
                        <div class="role-number">0</div>
                        <div class="role-info">
                            <div class="role-name">Demon Info</div>
                            <div class="role-player">${activeDemons.length > 0 ? activeDemons.map(r => playersByRole[r] || r).join(', ') : 'No demon in game'}</div>
                            <div class="role-instruction">
                                <strong>Wake the Demon.</strong> Point to their Minions. Show them the same 3 not-in-play characters (their safe bluffs).
                            </div>
                        </div>
                    </div>
                `;

                html += '<div class="section-header">Individual Night Actions</div>';
            }

            // Regular night order
            let orderNum = 1;
            order.forEach(item => {
                const isActive = activeRoles.has(item.role);
                const playerName = playersByRole[item.role] || '';

                html += `
                    <div class="role-card ${item.team} ${isActive ? '' : 'inactive'}">
                        <div class="role-number">${orderNum}</div>
                        <div class="role-info">
                            <div class="role-name">${item.role}</div>
                            ${playerName ? `<div class="role-player">${playerName}</div>` : '<div class="role-player" style="color: var(--text-muted);">Not assigned</div>'}
                            <div class="role-instruction">
                                ${item.instruction}
                                <div class="action"><strong>Action:</strong> ${item.action}</div>
                            </div>
                        </div>
                    </div>
                `;
                orderNum++;
            });

            if (order.length === 0) {
                html = '<div class="no-roles-message">No night actions for this night.</div>';
            }

            container.innerHTML = html;

            // Update first night button
            document.getElementById('firstNightBtn').classList.toggle('active', currentNight === 1);
        }

        // Initialize
        loadGameState();

        // Auto-refresh every 5 seconds to pick up changes from tracker/grimoire
        setInterval(loadGameState, 5000);
    </script>
</body>
</html>
