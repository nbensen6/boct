# fly.toml app configuration file generated for boct-tracker on 2026-01-02T18:47:22-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'boct'
primary_region = 'ewr'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Game state lives in-memory on a single machine. Running 2+ machines
# splits websocket connections between them and breaks game state.
# If we ever want HA, add a shared store (Redis/Postgres) first.
[deploy]
  max_unavailable = 1
  strategy = "immediate"
